title: Potential DNS Tunneling Activity
id: 12345678-1234-5678-9abc-123456789012
description: Detects potential DNS tunneling based on query characteristics
author: Lab Student
date: 2024/01/01
references:
    - https://attack.mitre.org/techniques/T1071/004/
logsource:
    product: zeek
    service: dns
detection:
    selection:
        query|contains:
            - 'a1b2c3d4e5f6'
            - 'deadbeef'
            - 'x9y8z7w6v5u4'
    condition: selection
falsepositives:
    - Legitimate applications using long domain names
level: medium
tags:
    - attack.command_and_control
    - attack.t1071.004
